<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Bangla - ড্রামা হাব</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #e91e63; }
        .video-container { margin-bottom: 30px; display: none; background: #111; padding: 10px; border-radius: 15px; }
        video { width: 100%; max-width: 700px; border-radius: 10px; border: 2px solid #e91e63; }
        .drama-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; border: 1px solid #333; }
        .card:hover { transform: scale(1.05); border-color: #e91e63; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .btn { background: #e91e63; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>K-Bangla</h1>
    <p>আপনার প্রিয় সব কে-ড্রামা এখন বাংলায়!</p>

    <div id="playerSection" class="video-container">
        <video id="mainPlayer" controls></video>
        <h3 id="videoTitle">ভিডিওর নাম</h3>
        <button class="btn" onclick="closePlayer()">বন্ধ করুন</button>
    </div>

    <div class="drama-grid">
        <div class="card" onclick="handleAdAndPlay('BAACAgUAAxkBAAMEZaaKHoQrq71z73n-TMiuwD6dzT8AAucgAAKxu0hV7_KnsOS0R6A6BA', 'কে-ড্রামা - এপিসোড ০১')">
            <img src="https://via.placeholder.com/150x200?text=Drama+1" alt="Poster">
            <p>এপিসোড ০১</p>
            <button class="btn">প্লে করুন</button>
        </div>
    </div>

    <script>
        // এই ফাংশনটি প্রথমে অ্যাড দেখাবে তারপর ভিডিও লোড করবে
        function handleAdAndPlay(fileId, title) {
            // ১. অ্যাড ওপেন করা (স্মার্ট লিঙ্ক)
            // নোট: সরাসরি window.open অনেক ব্রাউজারে ব্লক হয়, তাই ইউজার ক্লিক করার সাথে সাথেই এটি কাজ করবে।
            window.open('https://www.highrevenuenetwork.com/your_link_id', '_blank'); 
            
            // ২. ভিডিও লোড করার মেইন ফাংশন কল করা
            loadVideo(fileId, title);
        }

        async function loadVideo(fileId, title) {
            const playerSection = document.getElementById('playerSection');
            const videoPlayer = document.getElementById('mainPlayer');
            const videoTitle = document.getElementById('videoTitle');
            
            try {
                const response = await fetch(`/api/get-video?fileId=${fileId}`);
                const data = await response.json();

                if (data.url) {
                    videoPlayer.src = data.url;
                    videoTitle.innerText = title;
                    playerSection.style.display = 'block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    videoPlayer.play();
                } else {
                    alert("ভিডিওটি পাওয়া যায়নি।");
                }
            } catch (error) {
                alert("সার্ভার সমস্যা!");
            }
        }

        function closePlayer() {
            const playerSection = document.getElementById('playerSection');
            const videoPlayer = document.getElementById('mainPlayer');
            videoPlayer.pause();
            playerSection.style.display = 'none';
        }
    </script>
</body>
</html>
